services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    container_name: telegram-rag-api
    environment:
      - DATABASE_URL=
      - DATA_URL=${DATA_URL:-https://s3.twcstorage.ru/5f60ae52-8657-407e-a83b-00b9cae4a175/data}
      - PORT=3001
      - NODE_ENV=production
      - RAG_API_KEY=${RAG_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/rag/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 160M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  bot:
    build: .
    container_name: telegram-bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - API_URLS=${API_URLS:-http://api:3001}
      - RAG_API_KEY=${RAG_API_KEY:-}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
