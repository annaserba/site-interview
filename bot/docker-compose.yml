services:
  bot:
    build: .
    container_name: telegram-bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - API_URL=${API_URL:-http://10.0.0.1}
      - RAG_API_KEY=${RAG_API_KEY:-}
    network_mode: host
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
