name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build:ci

      - name: Check dist
        run: |
          if [ ! -f dist/index.html ]; then echo "ERROR: index.html missing" && exit 1; fi
          if [ ! -f dist/data/questions.json ]; then echo "ERROR: questions.json missing" && exit 1; fi
          page_count=$(find dist -name "index.html" | wc -l | tr -d ' ')
          echo "Built $page_count pages"

  health:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check site health
        run: |
          for url in \
            "http://sobes-it.ru/" \
            "http://sobes-it.ru/questions/" \
            "http://sobes-it.ru/blog/" \
            "http://sobes-it.ru/privacy/"; do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" || echo "000")
            if [ "$status" = "200" ] || [ "$status" = "301" ] || [ "$status" = "302" ]; then
              echo "✓ $url → $status"
            else
              echo "✗ $url → $status"
            fi
          done
