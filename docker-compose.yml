services:
  app:
    build: .
    container_name: interview-app
    ports:
      - "80:8080"
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DATA_URL=https://s3.twcstorage.ru/5f60ae52-8657-407e-a83b-00b9cae4a175/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
