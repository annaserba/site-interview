services:
  db:
    image: postgres:16-alpine
    container_name: interview-db
    environment:
      POSTGRES_DB: site_interview
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-interview_secret_2024}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    shm_size: 128m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d site_interview"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: interview-api
    environment:
      DATABASE_URL: postgresql://app:${DB_PASSWORD:-interview_secret_2024}@db:5432/site_interview
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://192.144.59.118}
      YANDEX_REDIRECT_URI: ${YANDEX_REDIRECT_URI:-http://192.144.59.118/api/auth/yandex/callback}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      PHONE_SALT: ${PHONE_SALT:-site-interview-salt-2024}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: interview-bot
    environment:
      API_URL: http://api:3001
      BOT_TOKEN: ${BOT_TOKEN:-}
    network_mode: host
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build: .
    container_name: interview-web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
