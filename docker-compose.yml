services:
  db:
    image: postgres:16-alpine
    container_name: interview-db
    environment:
      POSTGRES_DB: site_interview
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-interview_secret_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d site_interview"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: interview-api
    environment:
      DATABASE_URL: postgresql://app:${DB_PASSWORD:-interview_secret_2024}@db:5432/site_interview
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://192.144.59.118}
      YANDEX_REDIRECT_URI: ${YANDEX_REDIRECT_URI:-http://192.144.59.118/api/auth/yandex/callback}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      PHONE_SALT: ${PHONE_SALT:-site-interview-salt-2024}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  web:
    build: .
    container_name: interview-web
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  pgdata:
